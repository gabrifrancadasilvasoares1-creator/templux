<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada — Templux</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .not-found-inner { max-width: 480px; }
    .not-found-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .not-found-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .not-found-desc {
      color: var(--text-secondary);
      margin-bottom: 36px;
      line-height: 1.7;
    }
    .not-found-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<nav class="nav scrolled" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="nav-logo-dot"></div>Temp<span>lux</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
    <div class="nav-cta">
      <a href="contato.html" class="btn btn-ghost">Suporte</a>
      <a href="catalogo.html" class="btn btn-primary btn-sm">Ver templates →</a>
    </div>
    <button class="nav-hamburger" id="hamburger" aria-label="Abrir menu"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="nav-mobile" id="mobileMenu">
  <a href="index.html">Início</a>
  <a href="catalogo.html">Catálogo</a>
  <a href="sobre.html">Sobre</a>
  <a href="contato.html">Contato</a>
</div>

<div class="not-found">
  <div class="not-found-inner">
    <div class="not-found-code">404</div>
    <h1 class="not-found-title">Página não encontrada</h1>
    <p class="not-found-desc">O endereço que você acessou não existe ou foi movido.<br>Volte para o início e encontre o que procura.</p>
    <div class="not-found-actions">
      <a href="index.html" class="btn btn-primary btn-lg">Ir para o início →</a>
      <a href="catalogo.html" class="btn btn-secondary btn-lg">Ver catálogo</a>
    </div>
  </div>
</div>

<div id="globalToast" class="toast"></div>
<script src="script.js"></script>
</body>
</html>
